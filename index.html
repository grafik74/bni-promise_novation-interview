<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI 멤버십 갱신 리뷰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EE;--sur:#FDFCF9;--sur2:#EDEAE3;
  --bor:#D8D4CB;--borl:#E6E2DA;
  --tx:#1A1816;--txm:#68635B;--txh:#9A958E;
  --ac:#2B5BA8;--acl:#E8EFF9;--acd:#1A3D76;
  --gr:#2A7A4B;--grb:#E6F3EC;
  --wa:#9A5C0F;--wab:#FBF0E0;
  --re:#952626;--reb:#FAEBEB;
  --go:#C08A20;
  --r:8px;--rl:12px;
  --font:'Noto Sans KR',system-ui,sans-serif;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.65;}

/* ══════ UPLOAD SCREEN ══════ */
#uScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.uWrap{width:100%;max-width:520px;}
.uCard{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:40px 36px;text-align:center;}
.uLogo{width:220px;height:auto;margin:0 auto 24px;display:block;}
.uTitle{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px;}
.uSub{font-size:13px;color:var(--txm);margin-bottom:28px;line-height:1.7;}
.drop{border:2px dashed var(--bor);border-radius:12px;padding:32px 20px;cursor:pointer;transition:all .2s;margin-bottom:16px;}
.drop:hover,.drop.on{border-color:var(--ac);background:var(--acl);}
.drop input{display:none;}
.dropIco{font-size:32px;margin-bottom:10px;}
.dropLbl{font-size:14px;font-weight:600;margin-bottom:4px;}
.dropHint{font-size:12px;color:var(--txh);}
.fList{text-align:left;margin-bottom:16px;display:none;}
.fItem{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--sur2);border-radius:7px;margin-bottom:5px;font-size:13px;}
.fIco{width:26px;height:26px;background:var(--grb);border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--gr);font-size:9px;font-weight:700;flex-shrink:0;}
.fNm{flex:1;font-weight:500;color:var(--tx);}
.fRm{cursor:pointer;color:var(--txh);padding:2px 6px;border-radius:4px;font-size:15px;}
.fRm:hover{background:var(--reb);color:var(--re);}
.btnGo{width:100%;padding:13px;background:var(--tx);color:var(--bg);border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;display:none;}
.btnGo:hover{opacity:.82;}
.btnGo.vis{display:block;}
.pErr{color:var(--re);font-size:12px;margin-top:8px;display:none;}
.uDivider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--txh);font-size:12px;}
.uDivider::before,.uDivider::after{content:'';flex:1;height:1px;background:var(--bor);}
.btnArch{width:100%;padding:11px;background:transparent;color:var(--txm);border:1px solid var(--bor);border-radius:10px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.btnArch:hover{background:var(--sur2);border-color:var(--ac);color:var(--ac);}

/* ══════ ARCHIVE SCREEN ══════ */
#archScreen{display:none;min-height:100vh;background:var(--bg);}
.archHdr{background:var(--tx);color:var(--bg);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;}
.archHdr .logo{font-size:14px;font-weight:700;color:var(--go);}
.archBody{padding:32px;max-width:960px;margin:0 auto;}
.archTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.archTitle{font-size:20px;font-weight:700;}
.archFilters{display:flex;gap:8px;flex-wrap:wrap;}
.fChip{padding:6px 14px;border-radius:20px;border:1px solid var(--bor);background:var(--sur);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--txm);}
.fChip:hover,.fChip.on{background:var(--acl);border-color:var(--ac);color:var(--acd);}
.archGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.aCard{background:var(--sur);border:1px solid var(--borl);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .18s;}
.aCard:hover{border-color:var(--ac);background:var(--acl);}
.aCardTop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.aName{font-size:14px;font-weight:700;}
.aYear{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--sur2);color:var(--txm);}
.aStats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.aSp{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.aSp.a{background:#E3F0E7;color:#2A6B3A;}
.aSp.r{background:#E5EDF9;color:#2B4F8A;}
.aSp.o{background:#FBF0E0;color:#8A5510;}
.aDt{font-size:11px;color:var(--txh);}
.archEmpty{padding:60px;text-align:center;color:var(--txh);font-size:14px;}
.aCardDel{font-size:11px;color:var(--txh);cursor:pointer;padding:2px 6px;border-radius:4px;}
.aCardDel:hover{background:var(--reb);color:var(--re);}

/* ══════ APP SCREEN ══════ */
#appScreen{display:none;}
.hdr{background:var(--tx);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;}
.hBrand{display:flex;align-items:center;gap:10px;}
.hLogo{height:22px;width:auto;display:block;}
.hTitle{font-size:13px;font-weight:500;color:#C8C3BC;}
.hActs{display:flex;gap:6px;}
.hBtn{font-family:var(--font);font-size:12px;font-weight:500;padding:6px 13px;border-radius:7px;cursor:pointer;border:none;transition:all .15s;}
.hBtn.new{background:#38332E;color:#C0BAB3;}
.hBtn.new:hover{background:#484340;}
.hBtn.arch{background:#38332E;color:#C0BAB3;}
.hBtn.arch:hover{background:#484340;}
.hBtn.save{background:var(--gr);color:#fff;}
.hBtn.save:hover{opacity:.87;}
.hBtn.pall{background:var(--go);color:var(--tx);}
.hBtn.pall:hover{opacity:.87;}
.hBtn.pdf{background:var(--ac);color:#fff;}
.hBtn.pdf:hover{background:var(--acd);}

/* Layout: sidebar + main, fluid */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px);}
.sbar{background:var(--sur);border-right:1px solid var(--bor);padding:18px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.sSec{padding:0 14px;margin-bottom:18px;}
.sLbl{font-size:9px;font-weight:700;letter-spacing:1.3px;color:var(--txh);text-transform:uppercase;margin-bottom:7px;padding:0 4px;}
.mCard{background:var(--bg);border-radius:var(--r);padding:10px 12px;cursor:pointer;border:1.5px solid transparent;transition:all .18s;margin-bottom:3px;}
.mCard:hover{background:var(--sur2);}
.mCard.act{border-color:var(--ac);background:var(--acl);}
.mNm{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px;}
.mCard.act .mNm{color:var(--acd);}
.mStats{display:flex;gap:5px;flex-wrap:wrap;}
.sp{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.sp.a{background:#E3F0E7;color:#2A6B3A;}
.sp.r{background:#E5EDF9;color:#2B4F8A;}
.sp.o{background:#FBF0E0;color:#8A5510;}

/* Main content — fluid, no fixed max-width */
.main{padding:28px 32px;width:100%;}

/* Page header */
.ph{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--bor);}
.phName{font-size:24px;font-weight:700;letter-spacing:-0.4px;margin-bottom:3px;}
.phMeta{font-size:12px;color:var(--txm);}
.bper{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--sur2);color:var(--txm);border:1px solid var(--bor);}

/* PALMS grid — fluid */
.palms{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-top:14px;}
.pi{background:var(--sur);border:1px solid var(--borl);border-radius:var(--r);padding:10px 6px;text-align:center;}
.pv{font-size:18px;font-weight:700;line-height:1;margin-bottom:4px;}
.pl{font-size:9px;font-weight:600;letter-spacing:.5px;color:var(--txh);text-transform:uppercase;}
.pi.hi .pv{color:var(--ac);}
.pi.ok .pv{color:var(--gr);}
.pi.ng .pv{color:var(--wa);}

/* Sections */
.sec{background:var(--sur);border:1px solid var(--borl);border-radius:var(--rl);margin-bottom:14px;overflow:hidden;}
.scH{padding:12px 18px;border-bottom:1px solid var(--borl);display:flex;align-items:center;gap:9px;}
.scN{width:20px;height:20px;background:var(--tx);color:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.scT{font-size:13px;font-weight:700;}
.scB{padding:16px 18px;}

/* Form rows — fluid, responsive */
.fr{display:grid;gap:12px;margin-bottom:12px;}
.fr.c1{grid-template-columns:1fr;}
.fr.c2{grid-template-columns:repeat(2,minmax(0,1fr));}
.fr.c3{grid-template-columns:repeat(3,minmax(0,1fr));}
@media(max-width:700px){.fr.c2,.fr.c3{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;font-weight:700;color:var(--txm);letter-spacing:.5px;text-transform:uppercase;}
.fi,.fta,.fsel{font-family:var(--font);font-size:13px;padding:8px 11px;background:var(--bg);border:1px solid var(--bor);border-radius:7px;color:var(--tx);outline:none;transition:border-color .15s,background .15s;width:100%;}
.fi:focus,.fta:focus{border-color:var(--ac);background:var(--acl);}
.fi.pre{background:var(--sur2);color:var(--txm);border-color:var(--borl);cursor:default;}
.fta{resize:vertical;min-height:68px;line-height:1.65;}
.fta.sm{min-height:52px;}

/* Radio buttons */
.rg{display:flex;gap:5px;}
.rb{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 10px;background:var(--bg);border:1px solid var(--bor);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--txm);transition:all .15s;user-select:none;min-width:0;}
.rb:hover{border-color:var(--ac);color:var(--ac);}
.rb.y.s{background:var(--grb);border-color:var(--gr);color:var(--gr);}
.rb.n.s{background:var(--reb);border-color:var(--re);color:var(--re);}
.rb.na.s{background:var(--sur2);border-color:var(--bor);color:var(--txm);}

/* Attendance band */
.aRow{display:flex;border-radius:7px;overflow:hidden;border:1px solid var(--bor);}
.ac{flex:1;text-align:center;padding:8px 4px;background:var(--bg);border-right:1px solid var(--borl);min-width:0;}
.ac:last-child{border-right:none;}
.acL{font-size:9px;color:var(--txh);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.acV{font-size:17px;font-weight:700;}
.acV.g{color:var(--gr);}
.acV.b{color:var(--re);}

/* Training list */
.tri{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--borl);}
.tri:last-child{border-bottom:none;}
.tDot{width:7px;height:7px;border-radius:50%;background:var(--ac);margin-top:5px;flex-shrink:0;}
.tN{font-size:13px;font-weight:600;}
.tM{font-size:11px;color:var(--txh);margin-top:1px;}
.tEm{color:var(--txh);font-size:13px;font-style:italic;}

/* Role checkboxes */
.rGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;}
@media(max-width:600px){.rGrid{grid-template-columns:1fr 1fr;}}
.rChk{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--bg);border:1px solid var(--bor);border-radius:7px;cursor:pointer;transition:all .15s;user-select:none;}
.rChk:hover{border-color:var(--ac);}
.rChk.ck{background:var(--acl);border-color:var(--ac);}
.rCb{width:14px;height:14px;border:1.5px solid var(--bor);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.rChk.ck .rCb{background:var(--ac);border-color:var(--ac);}
.rChk.ck .rCb::after{content:'';width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:block;}
.rLbl{font-size:12px;color:var(--txm);}
.rChk.ck .rLbl{color:var(--acd);font-weight:600;}

/* Condition cards — fluid 2-col */
.cGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
@media(max-width:600px){.cGrid{grid-template-columns:1fr;}}
.cCard{background:var(--bg);border:1px solid var(--borl);border-radius:10px;padding:14px;}
.cLbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--txh);text-transform:uppercase;margin-bottom:9px;}
.cNote{margin-top:9px;}

/* Opinion box */
.opBox{background:var(--bg);border:1.5px solid var(--bor);border-radius:9px;padding:12px;}

/* Submit bar */
.subBar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--sur);border:1px solid var(--borl);border-radius:var(--rl);margin-top:6px;gap:16px;flex-wrap:wrap;}
.subInfo{font-size:12px;color:var(--txm);line-height:1.7;}
.subInfo strong{color:var(--tx);}
.subBtn{font-family:var(--font);font-size:13px;font-weight:700;padding:10px 24px;background:var(--ac);color:#fff;border:none;border-radius:9px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.subBtn:hover{background:var(--acd);}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;background:var(--tx);color:var(--bg);padding:12px 20px;border-radius:9px;font-size:13px;font-weight:500;transform:translateY(70px);opacity:0;transition:all .28s ease;z-index:999;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

/* Sidebar chapter info */
.chInfo{font-size:12px;color:var(--txm);line-height:1.9;padding:0 4px;}
.chInfo strong{color:var(--tx);}

/* ══════ PRINT ══════ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  #uScreen,#archScreen{display:none!important;}
  #appScreen{display:block!important;}
  .hdr,.sbar,.hActs,.subBar,.toast{display:none!important;}
  .layout{display:block!important;}
  body{background:#fff!important;margin:0!important;padding:0!important;}
  :root{--bg:#fff;--sur:#fff;--sur2:#f4f4f4;--bor:#bbb;--borl:#ddd;}
  .prPage{page-break-before:always;}
  .prPage:first-child{page-break-before:auto;}
  .main{padding:20px!important;width:auto!important;max-width:none!important;}
  .sec{border:1px solid #ccc!important;margin-bottom:10px!important;}
  .fi,.fta{border:1px solid #ccc!important;background:#fafafa!important;}
  .rb{border:1px solid #ccc!important;}
  .rb.s{border:1.5px solid #555!important;}
  .aRow{border:1px solid #ccc!important;}
  .cCard{border:1px solid #ccc!important;}
  .palms{gap:4px;}
  .pi{border:1px solid #ccc!important;}
}
</style>
</head>

<script>
/* ═══════════════════ STATE ═══════════════════ */
let MEMBERS=[], ACTIVE=0;
const FORMS={};
const pending=[];

/* ═══════════════════ FILE UPLOAD ═══════════════════ */
document.getElementById('fInput').addEventListener('change',e=>handleFiles(e.target.files));
const DZ=document.getElementById('dropZone');
DZ.addEventListener('dragover',e=>{e.preventDefault();DZ.classList.add('on');});
DZ.addEventListener('dragleave',()=>DZ.classList.remove('on'));
DZ.addEventListener('drop',e=>{e.preventDefault();DZ.classList.remove('on');handleFiles(e.dataTransfer.files);});
function handleFiles(files){
  for(const f of files){if(!pending.find(x=>x.name===f.name))pending.push(f);}
  renderFList();
}
function removeFile(i){pending.splice(i,1);renderFList();}
function renderFList(){
  const el=document.getElementById('fList');
  el.style.display=pending.length?'block':'none';
  el.innerHTML=pending.map((f,i)=>`<div class="fItem"><div class="fIco">XLS</div><span class="fNm">${f.name}</span><span class="fRm" onclick="removeFile(${i})">✕</span></div>`).join('');
  document.getElementById('btnGo').classList.toggle('vis',pending.length>0);
}

/* ═══════════════════ PARSE PALMS ═══════════════════ */
function parseXML(text){
  const doc=new DOMParser().parseFromString(text.replace(/\r/g,'\n'),'application/xml');
  const NS='urn:schemas-microsoft-com:office:spreadsheet';
  function cells(row){
    const res={};let cur=0;
    for(const c of row.getElementsByTagNameNS(NS,'Cell')){
      const idx=c.getAttributeNS(NS,'Index');
      cur=idx?parseInt(idx):cur+1;
      const d=c.getElementsByTagNameNS(NS,'Data')[0];
      res[cur]=d?d.textContent:'';
    }
    return res;
  }
  const ws=doc.getElementsByTagNameNS(NS,'Worksheet')[0];
  if(!ws)return null;
  const rows=Array.from(ws.getElementsByTagNameNS(NS,'Row'));
  const r=i=>cells(rows[i]||document.createElement('tr'));
  const member=r(5)[8]||'';
  const start=(r(6)[8]||'').slice(0,10).replace(/-/g,'.');
  const end=(r(7)[8]||'').slice(0,10).replace(/-/g,'.');
  const chapter=r(4)[8]||'';
  const region=r(2)[9]||'';
  function findLbl(lbl){
    for(let i=0;i<rows.length;i++){const c=cells(rows[i]);if((c[1]||'').trim()===lbl)return c[8]||'0';}
    return '0';
  }
  const attend=parseInt(findLbl('출석 (P)'))||0;
  const absent=parseInt(findLbl('결석'))||0;
  const late=parseInt(findLbl('지각'))||0;
  const sick=parseInt(findLbl('병가'))||0;
  const proxy=parseInt(findLbl('대리인'))||0;
  const total=parseInt(findLbl('총 미팅 수'))||(attend+absent+late+sick+proxy);
  let tot=null;
  for(let i=0;i<rows.length;i++){const c=cells(rows[i]);if((c[1]||'').trim()==='총합'){tot=c;break;}}
  const p=tot?{giveT1:parseFloat(tot[3]||0),giveT2:parseFloat(tot[5]||0),recvT1:parseFloat(tot[7]||0),recvT2:parseFloat(tot[8]||0),visitor:parseFloat(tot[9]||0),ooo:parseFloat(tot[11]||0),thanks:parseFloat(tot[13]||0),ceu:parseFloat(tot[14]||0)}:{giveT1:0,giveT2:0,recvT1:0,recvT2:0,visitor:0,ooo:0,thanks:0,ceu:0};
  const trainings=[];let inT=false;
  for(let i=0;i<rows.length;i++){
    const c=cells(rows[i]);
    if((c[1]||'').includes('트레이닝 정보')){inT=true;continue;}
    if(inT&&(c[1]||'').match(/^\d{4}-\d{2}/))trainings.push({date:c[1].slice(0,10).replace(/-/g,'.'),name:c[6]||'',type:c[10]||''});
  }
  return {member,start,end,chapter,region,stats:{attend,absent,late,sick,proxy,total},palms:p,trainings};
}

function parseXLSX(buf){
  const wb=XLSX.read(buf,{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  function findVal(lbl){
    for(const row of data)for(let i=0;i<row.length;i++)if(String(row[i]).trim()===lbl){for(let j=i+1;j<row.length;j++)if(row[j]!=='')return row[j];}
    return '';
  }
  function sv(l){return parseInt(findVal(l))||0;}
  function fd(v){if(!v)return '';if(v instanceof Date)return v.toISOString().slice(0,10).replace(/-/g,'.');return String(v).slice(0,10).replace(/-/g,'.');}
  const member=String(findVal('멤버:')||findVal('멤버')||'');
  const chapter=String(findVal('챕터:')||findVal('챕터')||'');
  const attend=sv('출석 (P)');const absent=sv('결석');const late=sv('지각');
  const sick=sv('병가');const proxy=sv('대리인');
  const total=sv('총 미팅 수')||(attend+absent+late+sick+proxy);
  let giveT1=0,giveT2=0,recvT1=0,recvT2=0,visitor=0,ooo=0,thanks=0,ceu=0;
  for(const row of data)if(String(row[0]).trim()==='총합'){giveT1=parseFloat(row[2]||0);giveT2=parseFloat(row[4]||0);recvT1=parseFloat(row[6]||0);recvT2=parseFloat(row[7]||0);visitor=parseFloat(row[8]||0);ooo=parseFloat(row[10]||0);thanks=parseFloat(row[12]||0);ceu=parseFloat(row[13]||0);break;}
  const trainings=[];let inT=false;
  for(const row of data){
    if(row.some(c=>String(c).includes('트레이닝 정보'))){inT=true;continue;}
    if(inT){const dv=row[0];if(!dv)continue;const ds=fd(dv);if(ds.match(/^\d{4}/))trainings.push({date:ds,name:String(row[5]||row[3]||''),type:String(row[9]||row[6]||'')});}
  }
  return {member,start:fd(findVal('시작일:')||findVal('시작일')),end:fd(findVal('종료:')||findVal('종료')),chapter,region:'',stats:{attend,absent,late,sick,proxy,total},palms:{giveT1,giveT2,recvT1,recvT2,visitor,ooo,thanks,ceu},trainings};
}

async function startApp(){
  document.getElementById('pErr').style.display='none';
  MEMBERS=[];
  for(const file of pending){
    try{
      const buf=await file.arrayBuffer();
      const bytes=new Uint8Array(buf);
      const sig=String.fromCharCode(...bytes.slice(0,6));
      let parsed;
      if(sig.startsWith('<?xml')||sig.startsWith('<')){
        parsed=parseXML(new TextDecoder('utf-8').decode(buf));
      }else{
        parsed=parseXLSX(buf);
      }
      if(parsed&&parsed.member){parsed.id=MEMBERS.length+1;MEMBERS.push(parsed);}
    }catch(e){console.warn(e);}
  }
  if(!MEMBERS.length){document.getElementById('pErr').style.display='block';return;}
  MEMBERS.forEach(m=>{
    FORMS[m.id]={spec:'',mind:'',referralPartner:'',salesPower:'',salesNote:'',stability:'',stabilityNote:'',contribution:'',contributionNote:'',engagement:'',engagementNote:'',opinion:'',interviewer:'',interviewDate:'',weekly:null,ethics:null,ethicsResolved:null,competitive:null,mainJob:null,event:null,specialty:'',specialtyChanged:null,roles:[],note:''};
  });
  ACTIVE=MEMBERS[0].id;
  const chp=MEMBERS[0].chapter||'BNI';
  document.getElementById('hTitle').textContent=`BNI ${chp} 챕터 — 갱신 리뷰`;
  document.getElementById('chInfo').innerHTML=`<strong>챕터</strong>: ${MEMBERS[0].chapter||'-'}<br><strong>지역</strong>: ${MEMBERS[0].region||'-'}<br><br><span style="font-size:11px;color:var(--txh)">갱신 30일 전까지<br>멤버십 위원이 완료</span>`;
  document.getElementById('uScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  renderSidebar();renderMain();
}

function resetApp(){
  pending.length=0;MEMBERS=[];

/* ═══════════════════ ARCHIVE (localStorage) ═══════════════════ */
const ARCH_KEY='bni_interviews';

function getArchive(){
  try{return JSON.parse(localStorage.getItem(ARCH_KEY)||'[]');}catch{return [];}
}
function saveArchive(data){
  localStorage.setItem(ARCH_KEY,JSON.stringify(data));
}

function saveAllToStorage(){
  const arch=getArchive();
  MEMBERS.forEach(m=>{
    const f=FORMS[m.id];
    const yearStr=m.start?m.start.slice(0,4):'0000';
    const key=`${m.member}__${m.start}`;
    const existing=arch.findIndex(x=>x.key===key);
    const rec={key,name:m.member,year:yearStr,period:`${m.start} ~ ${m.end}`,chapter:m.member&&m.start?m.chapter:'',savedAt:new Date().toLocaleString('ko-KR'),memberData:m,formData:f};
    if(existing>=0)arch[existing]=rec;
    else arch.push(rec);
  });
  saveArchive(arch);
  showToast(`${MEMBERS.length}명의 인터뷰가 저장되었습니다 ✓`);
}

let archFilter={year:'all'};

function openArchive(){
  document.getElementById('uScreen').style.display='none';

  document.getElementById('archScreen').style.display='block';

function renderArchive(){
  const arch=getArchive();
  // Gather years and names
  const years=[...new Set(arch.map(r=>r.year))].sort().reverse();
  const names=[...new Set(arch.map(r=>r.name))].sort();

  // Filters
  const fEl=document.getElementById('archFilters');
  fEl.innerHTML=`
    <span class="fChip ${archFilter.year==='all'?'on':''}" onclick="setArchFilter('year','all')">전체</span>
    ${years.map(y=>`<span class="fChip ${archFilter.year===y?'on':''}" onclick="setArchFilter('year','${y}')">${y}년</span>`).join('')}
  `;

  // Filter records
  let records=arch;
  if(archFilter.year!=='all')records=records.filter(r=>r.year===archFilter.year);
  records=records.sort((a,b)=>b.savedAt.localeCompare(a.savedAt));

  const grid=document.getElementById('archGrid');
  if(!records.length){
    grid.innerHTML='<div class="archEmpty" style="grid-column:1/-1">저장된 인터뷰 기록이 없습니다.</div>';
    return;
  }
  grid.innerHTML=records.map((r,i)=>`
    <div class="aCard" onclick="loadFromArchive('${esc(r.key)}')">
      <div class="aCardTop">
        <div class="aName">${r.name}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="aYear">${r.year}년</div>
          <div class="aCardDel" onclick="event.stopPropagation();deleteArchiveItem('${esc(r.key)}')" title="삭제">🗑</div>
        </div>
      </div>
      <div class="aStats">
        <span class="aSp a">출석 ${r.memberData.stats.attend}/${r.memberData.stats.total}</span>
        <span class="aSp r">T1 ${Math.round(r.memberData.palms.giveT1)}</span>
        <span class="aSp o">1-2-1 ${Math.round(r.memberData.palms.ooo)}</span>
      </div>
      <div class="aDt">${r.period}</div>
      <div class="aDt" style="margin-top:4px;font-size:10px;">저장: ${r.savedAt}</div>
    </div>
  `).join('');
}

function setArchFilter(type,val){
  archFilter[type]=val;
  renderArchive();
}

function loadFromArchive(key){
  const arch=getArchive();
  const rec=arch.find(r=>r.key===key);
  if(!rec)return;
  MEMBERS=[{...rec.memberData,id:1}];
  FORMS[1]={...rec.formData};
  ACTIVE=1;
  const chp=MEMBERS[0].chapter||'BNI';
  document.getElementById('hTitle').textContent=`BNI ${chp} 챕터 — 갱신 리뷰`;
  document.getElementById('chInfo').innerHTML=`<strong>챕터</strong>: ${MEMBERS[0].chapter||'-'}<br><strong>지역</strong>: ${MEMBERS[0].region||'-'}<br><br><span style="font-size:11px;color:var(--txh)">갱신 30일 전까지<br>멤버십 위원이 완료</span>`;
  document.getElementById('archScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  renderSidebar();renderMain();
  showToast(`${rec.name} 기록을 불러왔습니다.`);
}

function deleteArchiveItem(key){
  if(!confirm('이 기록을 삭제하시겠습니까?'))return;
  const arch=getArchive().filter(r=>r.key!==key);
  saveArchive(arch);
  renderArchive();
}

/* ═══════════════════ HTML HELPERS ═══════════════════ */
function pc(v,l,c){return `<div class="pi ${c}"><div class="pv">${v}</div><div class="pl">${l}</div></div>`;}
function aC(l,v,c){return `<div class="ac"><div class="acL">${l}</div><div class="acV ${c}">${v}</div></div>`;}
function pF(l,v){return `<div class="fg"><label class="fl">${l}</label><div class="fi pre">${v}</div></div>`;}
function yn(k,v){return `<div class="rg"><label class="rb y ${v==='yes'?'s':''}" onclick="rbk('${k}','yes',this)">Yes</label><label class="rb n ${v==='no'?'s':''}" onclick="rbk('${k}','no',this)">No</label></div>`;}
function ynna(k,v){return `<div class="rg"><label class="rb y ${v==='yes'?'s':''}" onclick="rbk('${k}','yes',this)">Yes</label><label class="rb n ${v==='no'?'s':''}" onclick="rbk('${k}','no',this)">No</label><label class="rb na ${v==='na'?'s':''}" onclick="rbk('${k}','na',this)">해당없음</label></div>`;}
function cC(key,lbl,opts,curV,nKey,nV,ph){
  const[o1,o2]=opts;
  return `<div class="cCard"><div class="cLbl">${lbl}</div><div class="rg"><label class="rb y ${curV===o1?'s':''}" onclick="rbk('${key}','${o1}',this)">${o1}</label><label class="rb n ${curV===o2?'s':''}" onclick="rbk('${key}','${o2}',this)">${o2}</label></div><div class="cNote"><textarea class="fta sm" placeholder="${ph}" oninput="upd('${nKey}',this.value)">${esc(nV)}</textarea></div></div>`;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ═══════════════════ INTERACTIONS ═══════════════════ */
function rbk(k,v,el){FORMS[ACTIVE][k]=v;el.closest('.rg').querySelectorAll('.rb').forEach(b=>b.classList.remove('s'));el.classList.add('s');}
function upd(k,v){FORMS[ACTIVE][k]=v;}
function toggleRole(role,el){const f=FORMS[ACTIVE];if(f.roles.includes(role)){f.roles=f.roles.filter(r=>r!==role);el.classList.remove('ck');}else{f.roles.push(role);el.classList.add('ck');}}

  const prev=ACTIVE;
  const c=document.getElementById('mainC');
  const allHtml=MEMBERS.map((m,i)=>{
    ACTIVE=m.id;
    const tmp=document.createElement('div');
    tmp.className=i>0?'prPage':'';
    renderMain();
    tmp.innerHTML=c.innerHTML;
    return tmp.outerHTML;
  }).join('');
  c.innerHTML=allHtml;
  window.print();
  ACTIVE=prev;renderSidebar();renderMain();
}
function doPDF(){
  // 현재 화면 콘텐츠 크기를 그대로 @page 사이즈로 설정해서 저장
  const main=document.getElementById('mainC');
  if(!main){window.print();return;}
  const w=Math.ceil(main.scrollWidth)+40;
  const h=Math.ceil(main.scrollHeight)+40;
  let ps=document.getElementById('__ps');
  if(!ps){ps=document.createElement('style');ps.id='__ps';document.head.appendChild(ps);}
  ps.textContent='@page{size:'+w+'px '+h+'px;margin:20px;}';
  showToast('인쇄 창에서 "PDF로 저장"을 선택하세요.');
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{ps.textContent='';},400);
  },300);
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
</script>
