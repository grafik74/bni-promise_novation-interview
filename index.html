<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI 멤버십 갱신 리뷰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EEE9;--sur:#FDFCF9;--sur2:#E8E5DE;
  --bor:#D2CEC4;--borl:#E0DDD6;
  --tx:#191715;--txm:#635E57;--txh:#98928B;
  --ac:#2653A3;--acl:#EAF0FA;--acd:#183880;
  --gr:#25724A;--grb:#E4F2EC;
  --wa:#8F570E;--wab:#FBF0E0;
  --re:#8C2323;--reb:#FAEBEB;
  --go:#B8821A;
  --r:10px;--rl:14px;
  --font:'Noto Sans KR',system-ui,sans-serif;
  --hdr:54px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,.10);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased;}

/* ══════ IMAGE ATTACHMENT ══════ */
.imgDrop{border:2px dashed var(--bor);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;}
.imgDrop:hover,.imgDrop.on{border-color:var(--ac);background:var(--acl);}
.imgDropIco{font-size:26px;margin-bottom:6px;}
.imgDropLbl{font-size:13px;font-weight:600;margin-bottom:3px;}
.imgDropHint{font-size:11px;color:var(--txh);}
.imgGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
.imgThumb{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--bor);aspect-ratio:3/4;background:var(--sur2);}
.imgThumb img{width:100%;height:100%;object-fit:cover;display:block;}
.imgThumbDel{position:absolute;top:5px;right:5px;width:24px;height:24px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:13px;line-height:1;transition:background .15s;}
.imgThumbDel:hover,.imgThumbDel:active{background:var(--re);}
.imgThumbNum{position:absolute;bottom:5px;left:6px;font-size:10px;color:#fff;background:rgba(0,0,0,.45);border-radius:4px;padding:1px 5px;}

/* ══════ UPLOAD SCREEN ══════ */
#uScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.uWrap{width:100%;max-width:520px;}
.uCard{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:36px 28px;text-align:center;box-shadow:var(--shadow-lg);}
.uLogo{width:180px;height:auto;margin:0 auto 20px;display:block;}
.uTitle{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px;}
.uSub{font-size:13px;color:var(--txm);margin-bottom:24px;line-height:1.7;}
.drop{border:2px dashed var(--bor);border-radius:14px;padding:32px 16px;cursor:pointer;transition:all .2s;margin-bottom:16px;background:var(--bg);}
.drop:hover,.drop.on{border-color:var(--ac);background:var(--acl);}
.drop input{display:none;}
.dropIco{font-size:30px;margin-bottom:8px;}
.dropLbl{font-size:14px;font-weight:600;margin-bottom:4px;}
.dropHint{font-size:12px;color:var(--txh);}
.fList{text-align:left;margin-bottom:16px;display:none;}
.fItem{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--sur2);border-radius:7px;margin-bottom:5px;font-size:13px;}
.fIco{width:26px;height:26px;background:var(--grb);border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--gr);font-size:9px;font-weight:700;flex-shrink:0;}
.fNm{flex:1;font-weight:500;color:var(--tx);}
.fRm{cursor:pointer;color:var(--txh);padding:4px 8px;border-radius:4px;font-size:16px;}
.fRm:hover,.fRm:active{background:var(--reb);color:var(--re);}
.btnGo{width:100%;padding:14px;background:var(--tx);color:var(--bg);border:none;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;display:none;}
.btnGo:hover,.btnGo:active{opacity:.82;}
.btnGo.vis{display:block;}
.pErr{color:var(--re);font-size:12px;margin-top:8px;display:none;}
.uDivider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--txh);font-size:12px;}
.uDivider::before,.uDivider::after{content:'';flex:1;height:1px;background:var(--bor);}
.btnArch{width:100%;padding:12px;background:transparent;color:var(--txm);border:1px solid var(--bor);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;}
.btnArch:hover,.btnArch:active{background:var(--sur2);border-color:var(--ac);color:var(--ac);}

/* ══════ ARCHIVE SCREEN ══════ */
#archScreen{display:none;min-height:100vh;background:var(--bg);}
.archHdr{background:linear-gradient(135deg,#1a1816 0%,#2a2520 100%);color:var(--bg);height:var(--hdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.archHdr .logo{font-size:13px;font-weight:700;color:var(--go);}
.archBody{padding:16px;max-width:960px;margin:0 auto;}
.archTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.archTitle{font-size:18px;font-weight:700;}
.archFilters{display:flex;gap:6px;flex-wrap:wrap;}
.fChip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bor);background:var(--sur);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txm);}
.fChip:hover,.fChip.on,.fChip:active{background:var(--acl);border-color:var(--ac);color:var(--acd);}
.archGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.aCard{background:var(--sur);border:1px solid var(--borl);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.aCard:hover,.aCard:active{border-color:var(--ac);background:var(--acl);}
.aCardTop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.aName{font-size:14px;font-weight:700;}
.aYear{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--sur2);color:var(--txm);}
.aStats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.aSp{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.aSp.a{background:#E3F0E7;color:#2A6B3A;}
.aSp.r{background:#E5EDF9;color:#2B4F8A;}
.aSp.o{background:#FBF0E0;color:#8A5510;}
.aDt{font-size:11px;color:var(--txh);}
.archEmpty{padding:48px 16px;text-align:center;color:var(--txh);font-size:14px;}
.aCardDel{font-size:12px;color:var(--txh);cursor:pointer;padding:4px 8px;border-radius:4px;}
.aCardDel:hover,.aCardDel:active{background:var(--reb);color:var(--re);}

/* ══════ APP SCREEN ══════ */
#appScreen{display:none;}

/* 헤더 */
.hdr{background:linear-gradient(135deg,#1a1816 0%,#2a2520 100%);height:var(--hdr);display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:sticky;top:0;z-index:100;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hBrand{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.hLogo{height:20px;width:auto;display:block;}
.hTitle{font-size:12px;font-weight:500;color:#C8C3BC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hActs{display:flex;gap:4px;flex-shrink:0;}
.hBtn{font-family:var(--font);font-size:11px;font-weight:700;padding:7px 12px;border-radius:20px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;letter-spacing:.1px;}
.hBtn.new{background:#38332E;color:#C0BAB3;}
.hBtn.new:hover,.hBtn.new:active{background:#484340;}
.hBtn.arch{background:#38332E;color:#C0BAB3;}
.hBtn.arch:hover,.hBtn.arch:active{background:#484340;}
.hBtn.save{background:var(--gr);color:#fff;}
.hBtn.save:hover,.hBtn.save:active{opacity:.87;}
.hBtn.pall{background:var(--go);color:var(--tx);}
.hBtn.pall:hover,.hBtn.pall:active{opacity:.87;}
.hBtn.pdf{background:var(--ac);color:#fff;}
.hBtn.pdf:hover,.hBtn.pdf:active{background:var(--acd);}

/* 사이드바 + 메인 레이아웃 */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - var(--hdr));}
.sbar{background:var(--sur);border-right:1px solid var(--bor);padding:14px 0;position:sticky;top:var(--hdr);height:calc(100vh - var(--hdr));overflow-y:auto;}
.sSec{padding:0 12px;margin-bottom:16px;}
.sLbl{font-size:9px;font-weight:700;letter-spacing:1.3px;color:var(--txh);text-transform:uppercase;margin-bottom:6px;padding:0 4px;}
.mCard{background:var(--bg);border-radius:var(--r);padding:11px 12px;cursor:pointer;border:1.5px solid transparent;transition:all .18s;margin-bottom:4px;}
.mCard:hover,.mCard:active{background:var(--sur2);}
.mCard.act{border-color:var(--ac);background:var(--acl);box-shadow:0 0 0 1px var(--ac);}
.mNm{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px;}
.mCard.act .mNm{color:var(--acd);}
.mStats{display:flex;gap:5px;flex-wrap:wrap;}
.sp{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.sp.a{background:#E3F0E7;color:#2A6B3A;}
.sp.r{background:#E5EDF9;color:#2B4F8A;}
.sp.o{background:#FBF0E0;color:#8A5510;}

/* 모바일: 사이드바를 상단 수평 스크롤 바로 전환 */
@media(max-width:680px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .sbar{
    position:sticky;top:var(--hdr);z-index:90;
    height:auto;
    overflow-y:visible;overflow-x:auto;
    border-right:none;border-bottom:1px solid var(--bor);
    padding:10px 12px;
    display:flex;flex-direction:row;align-items:stretch;gap:0;
    -webkit-overflow-scrolling:touch;
  }
  .sSec{padding:0;margin-bottom:0;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .sSec+.sSec{margin-left:12px;padding-left:12px;border-left:1px solid var(--bor);}
  .sLbl{display:none;}
  #mList{display:flex;flex-direction:row;gap:6px;}
  .mCard{margin-bottom:0;white-space:nowrap;padding:8px 12px;}
  .mStats{display:none;}
  .chInfo{display:none;}
  /* 챕터정보 구분선 숨기기 */
  .sbar > div[style*="height:1px"],.sbarDivider{display:none;}
  .sSecChapter{display:none;}
}

.main{padding:16px;width:100%;}
@media(min-width:681px){.main{padding:24px 28px;}}

.ph{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bor);}
.phName{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
@media(min-width:681px){.phName{font-size:22px;}}
.phMeta{font-size:12px;color:var(--txm);}
.bper{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--sur2);color:var(--txm);border:1px solid var(--bor);}
.palms{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:12px;}
@media(min-width:480px){.palms{grid-template-columns:repeat(7,minmax(0,1fr));}}
.pi{background:var(--sur);border:1px solid var(--borl);border-radius:var(--r);padding:10px 4px;text-align:center;box-shadow:var(--shadow-sm);transition:transform .15s;}
.pv{font-size:16px;font-weight:700;line-height:1;margin-bottom:3px;}
@media(min-width:681px){.pv{font-size:18px;}}
.pl{font-size:9px;font-weight:600;letter-spacing:.4px;color:var(--txh);text-transform:uppercase;}
.pi.hi{background:var(--acl);border-color:rgba(38,83,163,.2);}.pi.hi .pv{color:var(--ac);}
.pi.ok{background:var(--grb);border-color:rgba(37,114,74,.2);}.pi.ok .pv{color:var(--gr);}
.pi.ng{background:var(--wab);border-color:rgba(143,87,14,.2);}.pi.ng .pv{color:var(--wa);}

.sec{background:var(--sur);border:1px solid var(--borl);border-radius:var(--rl);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
.scH{padding:12px 16px;border-bottom:1px solid var(--borl);display:flex;align-items:center;gap:9px;background:linear-gradient(to bottom,var(--sur),var(--bg));}
.scN{width:22px;height:22px;background:var(--ac);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.scT{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:-.1px;}
.scB{padding:14px;}

.fr{display:grid;gap:10px;margin-bottom:10px;}
.fr.c1{grid-template-columns:1fr;}
.fr.c2{grid-template-columns:repeat(2,minmax(0,1fr));}
.fr.c3{grid-template-columns:repeat(3,minmax(0,1fr));}
@media(max-width:500px){.fr.c2,.fr.c3{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;font-weight:700;color:var(--txm);letter-spacing:.5px;text-transform:uppercase;}
.fi,.fta,.fsel{font-family:var(--font);font-size:14px;padding:10px 13px;background:var(--bg);border:1.5px solid var(--bor);border-radius:10px;color:var(--tx);outline:none;transition:border-color .15s,background .15s,box-shadow .15s;width:100%;-webkit-appearance:none;}
.fi:focus,.fta:focus{border-color:var(--ac);background:var(--acl);box-shadow:0 0 0 3px rgba(38,83,163,.12);}
.fi.pre{background:var(--sur2);color:var(--txm);border-color:var(--borl);cursor:default;}
.fta{resize:vertical;min-height:72px;line-height:1.65;}
.fta.sm{min-height:56px;}

.rg{display:flex;gap:6px;}
.rb{flex:1;display:flex;align-items:center;justify-content:center;padding:11px 8px;background:var(--bg);border:1.5px solid var(--bor);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--txm);transition:all .15s;user-select:none;min-width:0;}
.rb:hover,.rb:active{border-color:var(--ac);color:var(--ac);}
.rb.y.s{background:var(--grb);border-color:var(--gr);color:var(--gr);box-shadow:0 0 0 2px rgba(37,114,74,.15);}
.rb.n.s{background:var(--reb);border-color:var(--re);color:var(--re);box-shadow:0 0 0 2px rgba(140,35,35,.15);}
.rb.na.s{background:var(--sur2);border-color:var(--bor);color:var(--txm);}

.aRow{display:flex;border-radius:7px;overflow:hidden;border:1px solid var(--bor);}
.ac{flex:1;text-align:center;padding:8px 2px;background:var(--bg);border-right:1px solid var(--borl);min-width:0;}
.ac:last-child{border-right:none;}
.acL{font-size:9px;color:var(--txh);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.acV{font-size:15px;font-weight:700;}
@media(min-width:400px){.acV{font-size:17px;}}
.acV.g{color:var(--gr);}
.acV.b{color:var(--re);}

.tri{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--borl);}
.tri:last-child{border-bottom:none;}
.tDot{width:7px;height:7px;border-radius:50%;background:var(--ac);margin-top:5px;flex-shrink:0;}
.tN{font-size:13px;font-weight:600;}
.tM{font-size:11px;color:var(--txh);margin-top:1px;}
.tEm{color:var(--txh);font-size:13px;font-style:italic;}

.rGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(min-width:480px){.rGrid{grid-template-columns:repeat(3,minmax(0,1fr));}}
.rChk{display:flex;align-items:center;gap:8px;padding:11px 12px;background:var(--bg);border:1.5px solid var(--bor);border-radius:10px;cursor:pointer;transition:all .15s;user-select:none;}
.rChk:hover,.rChk:active{border-color:var(--ac);}
.rChk.ck{background:var(--acl);border-color:var(--ac);}
.rCb{width:16px;height:16px;border:1.5px solid var(--bor);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.rChk.ck .rCb{background:var(--ac);border-color:var(--ac);}
.rChk.ck .rCb::after{content:'';width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:block;}
.rLbl{font-size:12px;color:var(--txm);}
.rChk.ck .rLbl{color:var(--acd);font-weight:600;}

.cGrid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:500px){.cGrid{grid-template-columns:repeat(2,minmax(0,1fr));}}
.cCard{background:var(--bg);border:1px solid var(--borl);border-radius:10px;padding:12px;}
.cLbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--txh);text-transform:uppercase;margin-bottom:8px;}
.cNote{margin-top:8px;}

.opBox{background:var(--bg);border:1.5px solid var(--bor);border-radius:9px;padding:12px;}

.subBar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--sur);border:1px solid var(--borl);border-radius:var(--rl);margin-top:8px;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow);}
.subInfo{font-size:12px;color:var(--txm);line-height:1.7;}
.subInfo strong{color:var(--tx);}
.subBtn{font-family:var(--font);font-size:14px;font-weight:700;padding:13px 28px;background:var(--ac);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .15s;white-space:nowrap;width:100%;box-shadow:0 2px 8px rgba(38,83,163,.3);}
@media(min-width:480px){.subBtn{width:auto;}}
.subBtn:hover,.subBtn:active{background:var(--acd);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:var(--bg);padding:11px 20px;border-radius:9px;font-size:13px;font-weight:500;opacity:0;transition:all .28s ease;z-index:9998;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* 로딩 오버레이 */
.loading-overlay{position:fixed;inset:0;background:rgba(26,24,22,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;display:none;}
.loading-overlay.on{display:flex;}
.loading-box{background:var(--sur);border-radius:18px;padding:32px 40px;text-align:center;box-shadow:var(--shadow-lg);}
.loading-spinner{width:32px;height:32px;border:3px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--txm);}

.chInfo{font-size:12px;color:var(--txm);line-height:1.9;padding:0 4px;}
.chInfo strong{color:var(--tx);}

/* Supabase 상태 표시 */
.db-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:8px;letter-spacing:.2px;}
.db-badge.ok{background:#E3F0E7;color:#2A6B3A;}
.db-badge.err{background:var(--reb);color:var(--re);}
.db-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}

/* 헤더 버튼 모바일 압축 — 인쇄/PDF는 하단 FAB으로 이동 */
@media(max-width:480px){
  .hBtn{font-size:11px;padding:7px 9px;}
  .hBtn.pall,.hBtn.pdf{display:none;}  /* 하단 바에서 대체 */
  .hTitle{display:none;}
  .db-badge{display:none;}
}
@media(max-width:360px){
  .hBtn.arch{display:none;}
}

/* ══════ 모바일 하단 고정 액션 바 ══════ */
.mobileBar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--sur);
  border-top:1px solid var(--bor);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  gap:8px;
}
@media(max-width:480px){
  .mobileBar{display:flex;}
  /* 본문이 하단 바에 가리지 않도록 여백 */
  #appScreen .main{padding-bottom:80px;}
}
.mobileBar .mBtn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 4px;border:none;border-radius:10px;
  font-family:var(--font);font-size:10px;font-weight:600;cursor:pointer;
  transition:all .15s;
}
.mobileBar .mBtn .mIco{font-size:18px;line-height:1;}
.mobileBar .mBtn.msave{background:var(--gr);color:#fff;}
.mobileBar .mBtn.march{background:var(--sur2);color:var(--txm);}
.mobileBar .mBtn.mnew{background:var(--sur2);color:var(--txm);}
.mobileBar .mBtn.mpall{background:var(--go);color:#fff;}
.mobileBar .mBtn.mpdf{background:var(--ac);color:#fff;}
.mobileBar .mBtn:active{opacity:.78;transform:scale(.96);}

/* ══════ 스크롤바 ══════ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--txh);}

/* ══════ 선택 색상 ══════ */
::selection{background:var(--acl);color:var(--acd);}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  #uScreen,#archScreen,.loading-overlay{display:none!important;}
  #appScreen{display:block!important;}
  .hdr,.sbar,.hActs,.subBar,.toast,.mobileBar{display:none!important;}
  .layout{display:block!important;}
  body{background:#fff!important;margin:0!important;padding:0!important;}
  :root{--bg:#fff;--sur:#fff;--sur2:#f4f4f4;--bor:#bbb;--borl:#ddd;}
  .prPage{page-break-before:always;}
  .prPage:first-child{page-break-before:auto;}
  .main{padding:16px!important;width:auto!important;max-width:none!important;}
  .imgDrop{display:none;}
  .imgThumbDel{display:none;}
}
</style>

// 전체 레코드 조회
async function dbGetAll() {
  if (!sbClient) throw new Error('Supabase 미연결');
  const { data, error } = await sbClient
    .from(TABLE)
    .select('*')
    .order('saved_at', { ascending: false });

// 저장 (upsert: key 기준)
async function dbUpsert(record) {
  if (!sbClient) throw new Error('Supabase 미연결');
  const { data, error } = await sbClient
    .from(TABLE)
    .upsert(record, { onConflict: 'key' })
    .select();
  if (error) throw error;
  return data;
}

// 삭제
async function dbDelete(key) {
  if (!sbClient) throw new Error('Supabase 미연결');
  const { error } = await sbClient
    .from(TABLE)
    .delete()
    .eq('key', key);
  if (error) throw error;
}

/* ═══════════════════════════════════════════════════
   PARSE PALMS
═══════════════════════════════════════════════════ */
function parseXML(text) {
  const doc = new DOMParser().parseFromString(text.replace(/\r/g, '\n'), 'application/xml');
  const NS = 'urn:schemas-microsoft-com:office:spreadsheet';
  function cells(row) {
    const res = {}; let cur = 0;
    for (const c of row.getElementsByTagNameNS(NS, 'Cell')) {
      const idx = c.getAttributeNS(NS, 'Index');
      cur = idx ? parseInt(idx) : cur + 1;
      const d = c.getElementsByTagNameNS(NS, 'Data')[0];
      res[cur] = d ? d.textContent : '';
    }
    return res;
  }
  const ws = doc.getElementsByTagNameNS(NS, 'Worksheet')[0];
  if (!ws) return null;
  const rows = Array.from(ws.getElementsByTagNameNS(NS, 'Row'));
  const r = i => cells(rows[i] || document.createElement('tr'));
  const member = r(5)[8] || '';
  const start = (r(6)[8] || '').slice(0, 10).replace(/-/g, '.');
  const end = (r(7)[8] || '').slice(0, 10).replace(/-/g, '.');
  const chapter = r(4)[8] || '';
  const region = r(2)[9] || '';
  function findLbl(lbl) {
    for (let i = 0; i < rows.length; i++) { const c = cells(rows[i]); if ((c[1] || '').trim() === lbl) return c[8] || '0'; }
    return '0';
  }
  const attend = parseInt(findLbl('출석 (P)')) || 0;
  const absent = parseInt(findLbl('결석')) || 0;
  const late = parseInt(findLbl('지각')) || 0;
  const sick = parseInt(findLbl('병가')) || 0;
  const proxy = parseInt(findLbl('대리인')) || 0;
  const total = parseInt(findLbl('총 미팅 수')) || (attend + absent + late + sick + proxy);
  let tot = null;
  for (let i = 0; i < rows.length; i++) { const c = cells(rows[i]); if ((c[1] || '').trim() === '총합') { tot = c; break; } }
  const p = tot ? { giveT1: parseFloat(tot[3] || 0), giveT2: parseFloat(tot[5] || 0), recvT1: parseFloat(tot[7] || 0), recvT2: parseFloat(tot[8] || 0), visitor: parseFloat(tot[9] || 0), ooo: parseFloat(tot[11] || 0), thanks: parseFloat(tot[13] || 0), ceu: parseFloat(tot[14] || 0) } : { giveT1: 0, giveT2: 0, recvT1: 0, recvT2: 0, visitor: 0, ooo: 0, thanks: 0, ceu: 0 };
  const trainings = []; let inT = false;
  for (let i = 0; i < rows.length; i++) {
    const c = cells(rows[i]);
    if ((c[1] || '').includes('트레이닝 정보')) { inT = true; continue; }
    if (inT && (c[1] || '').match(/^\d{4}-\d{2}/)) trainings.push({ date: c[1].slice(0, 10).replace(/-/g, '.'), name: c[6] || '', type: c[10] || '' });
  }
  return { member, start, end, chapter, region, stats: { attend, absent, late, sick, proxy, total }, palms: p, trainings };
}

function parseXLSX(buf) {
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  function findVal(lbl) {
    for (const row of data) for (let i = 0; i < row.length; i++) if (String(row[i]).trim() === lbl) { for (let j = i + 1; j < row.length; j++) if (row[j] !== '') return row[j]; }
    return '';
  }
  function sv(l) { return parseInt(findVal(l)) || 0; }
  function fd(v) { if (!v) return ''; if (v instanceof Date) return v.toISOString().slice(0, 10).replace(/-/g, '.'); return String(v).slice(0, 10).replace(/-/g, '.'); }
  const member = String(findVal('멤버:') || findVal('멤버') || '');
  const chapter = String(findVal('챕터:') || findVal('챕터') || '');
  const attend = sv('출석 (P)'); const absent = sv('결석'); const late = sv('지각');
  const sick = sv('병가'); const proxy = sv('대리인');
  const total = sv('총 미팅 수') || (attend + absent + late + sick + proxy);
  let giveT1 = 0, giveT2 = 0, recvT1 = 0, recvT2 = 0, visitor = 0, ooo = 0, thanks = 0, ceu = 0;
  for (const row of data) if (String(row[0]).trim() === '총합') { giveT1 = parseFloat(row[2] || 0); giveT2 = parseFloat(row[4] || 0); recvT1 = parseFloat(row[6] || 0); recvT2 = parseFloat(row[7] || 0); visitor = parseFloat(row[8] || 0); ooo = parseFloat(row[10] || 0); thanks = parseFloat(row[12] || 0); ceu = parseFloat(row[13] || 0); break; }
  const trainings = []; let inT = false;
  for (const row of data) {
    if (row.some(c => String(c).includes('트레이닝 정보'))) { inT = true; continue; }
    if (inT) { const dv = row[0]; if (!dv) continue; const ds = fd(dv); if (ds.match(/^\d{4}/)) trainings.push({ date: ds, name: String(row[5] || row[3] || ''), type: String(row[9] || row[6] || '') }); }
  }
  return { member, start: fd(findVal('시작일:') || findVal('시작일')), end: fd(findVal('종료:') || findVal('종료')), chapter, region: '', stats: { attend, absent, late, sick, proxy, total }, palms: { giveT1, giveT2, recvT1, recvT2, visitor, ooo, thanks, ceu }, trainings };
}

async function startApp() {
  document.getElementById('pErr').style.display = 'none';
  MEMBERS = [];
  for (const file of pending) {
    try {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      const sig = String.fromCharCode(...bytes.slice(0, 6));
      let parsed;
      if (sig.startsWith('<?xml') || sig.startsWith('<')) {
        parsed = parseXML(new TextDecoder('utf-8').decode(buf));

      const key = `${safeChapter}__${safeMember}__${safeStart}`;

      const record = {
        key,
        name: m.member,
        year: yearStr,
        period: `${m.start} ~ ${m.end}`,
        chapter: m.chapter || '',
        saved_at: new Date().toISOString(),

  } catch(e) {
    hideLoading();
    console.error('저장 오류 상세:', e);
    // RLS 오류 안내
    const msg = e.message || JSON.stringify(e);
    if (msg.includes('row-level security') || msg.includes('42501') || msg.includes('new row violates')) {
      showToast('❌ RLS 오류: Supabase → Table Editor → bni_interviews → RLS 정책을 확인하세요.');
    } else {
      showToast(`❌ 저장 실패: ${msg}`);
    }
  }
}

/* ═══════════════════════════════════════════════════
   IMAGE ATTACHMENT
═══════════════════════════════════════════════════ */
function handleImgSelect(event, memberId) {
  const files = Array.from(event.target.files);
  addImagesToForm(memberId, files);
  event.target.value = ''; // 같은 파일 재선택 허용
}
function handleImgDrop(event, memberId) {
  const files = Array.from(event.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  addImagesToForm(memberId, files);
}
async function addImagesToForm(memberId, files) {
  if (!FORMS[memberId].images) FORMS[memberId].images = [];
  for (const file of files) {
    const b64 = await fileToBase64(file);
    FORMS[memberId].images.push({ name: file.name, type: file.type, data: b64 });
  }
  refreshImgGrid(memberId);
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // data URL 포함
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function removeImg(memberId, idx) {
  if (!FORMS[memberId].images) return;
  FORMS[memberId].images.splice(idx, 1);
  refreshImgGrid(memberId);
}
function refreshImgGrid(memberId) {
  const el = document.getElementById(`imgGrid_${memberId}`);
  if (el) el.innerHTML = renderImgGrid(memberId);
}
function renderImgGrid(memberId) {
  const imgs = (FORMS[memberId] && FORMS[memberId].images) || [];
  if (!imgs.length) return '';
  return imgs.map((img, i) => `
    <div class="imgThumb">
      <img src="${img.data}" alt="${esc(img.name)}" onclick="openImgPreview('${memberId}',${i})">
      <div class="imgThumbDel" onclick="removeImg(${memberId},${i})" title="삭제">✕</div>
      <div class="imgThumbNum">${i + 1}</div>
    </div>`).join('');
}
function openImgPreview(memberId, idx) {
  const imgs = (FORMS[memberId] && FORMS[memberId].images) || [];
  if (!imgs[idx]) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  overlay.onclick = () => document.body.removeChild(overlay);
  const img = document.createElement('img');
  img.src = imgs[idx].data;
  img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);';
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

/* ═══════════════════════════════════════════════════
   HTML HELPERS
═══════════════════════════════════════════════════ */
function pc(v, l, c) { return `<div class="pi ${c}"><div class="pv">${v}</div><div class="pl">${l}</div></div>`; }
function aC(l, v, c) { return `<div class="ac"><div class="acL">${l}</div><div class="acV ${c}">${v}</div></div>`; }
function pF(l, v) { return `<div class="fg"><label class="fl">${l}</label><div class="fi pre">${v}</div></div>`; }
function yn(k, v) { return `<div class="rg"><label class="rb y ${v === 'yes' ? 's' : ''}" onclick="rbk('${k}','yes',this)">Yes</label><label class="rb n ${v === 'no' ? 's' : ''}" onclick="rbk('${k}','no',this)">No</label></div>`; }
function ynna(k, v) { return `<div class="rg"><label class="rb y ${v === 'yes' ? 's' : ''}" onclick="rbk('${k}','yes',this)">Yes</label><label class="rb n ${v === 'no' ? 's' : ''}" onclick="rbk('${k}','no',this)">No</label><label class="rb na ${v === 'na' ? 's' : ''}" onclick="rbk('${k}','na',this)">해당없음</label></div>`; }
function cC(key, lbl, opts, curV, nKey, nV, ph) {
  const [o1, o2] = opts;
  return `<div class="cCard"><div class="cLbl">${lbl}</div><div class="rg"><label class="rb y ${curV === o1 ? 's' : ''}" onclick="rbk('${key}','${o1}',this)">${o1}</label><label class="rb n ${curV === o2 ? 's' : ''}" onclick="rbk('${key}','${o2}',this)">${o2}</label></div><div class="cNote"><textarea class="fta sm" placeholder="${ph}" oninput="upd('${nKey}',this.value)">${esc(nV)}</textarea></div></div>`;
}
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

/* ═══════════════════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════════════════ */
function rbk(k, v, el) { FORMS[ACTIVE][k] = v; el.closest('.rg').querySelectorAll('.rb').forEach(b => b.classList.remove('s')); el.classList.add('s'); }
function upd(k, v) { FORMS[ACTIVE][k] = v; }
function toggleRole(role, el) { const f = FORMS[ACTIVE]; if (f.roles.includes(role)) { f.roles = f.roles.filter(r => r !== role); el.classList.remove('ck'); } else { f.roles.push(role); el.classList.add('ck'); } }

/* ═══════════════════════════════════════════════════
   PRINT / PDF
═══════════════════════════════════════════════════ */
function doPrintAll() {
  const prev = ACTIVE;
  const c = document.getElementById('mainC');
  const allHtml = MEMBERS.map((m, i) => {
    ACTIVE = m.id;
    const tmp = document.createElement('div');
    tmp.className = i > 0 ? 'prPage' : '';
    renderMain();
    tmp.innerHTML = c.innerHTML;
    return tmp.outerHTML;
  }).join('');
  c.innerHTML = allHtml;
  window.print();
  ACTIVE = prev; renderSidebar(); renderMain();
}
function doPDF() {
  const main = document.getElementById('mainC');
  if (!main) { window.print(); return; }
  const w = Math.ceil(main.scrollWidth) + 40;
  const h = Math.ceil(main.scrollHeight) + 40;
  let ps = document.getElementById('__ps');
  if (!ps) { ps = document.createElement('style'); ps.id = '__ps'; document.head.appendChild(ps); }
  ps.textContent = '@page{size:' + w + 'px ' + h + 'px;margin:20px;}';
  showToast('인쇄 창에서 "PDF로 저장"을 선택하세요.');
  setTimeout(() => { window.print(); setTimeout(() => { ps.textContent = ''; }, 400); }, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
